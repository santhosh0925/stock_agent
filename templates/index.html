<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Agent - AI-Powered Stock Analysis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #666;
            font-size: 1em;
        }

        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .dropdown-container {
            flex: 1;
            min-width: 200px;
            position: relative;
        }

        select, input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
            background-color: white;
        }

        input {
            flex: 1;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
        }

        select {
            cursor: pointer;
            appearance: none;
            padding-right: 35px;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 1.5em;
            padding-right: 35px;
        }

        button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: 600;
            display: none;
            margin: 20px 0;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result {
            display: none;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            margin-top: 30px;
            border-left: 5px solid #667eea;
        }

        .result.show {
            display: block;
            animation: slideIn 0.3s ease-in-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-header {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .result-item {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .result-label {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .result-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
        }

        .trend-up {
            color: #10b981;
        }

        .trend-down {
            color: #ef4444;
        }

        .explanation {
            background: white;
            padding: 20px;
            border-radius: 10px;
            line-height: 1.6;
            color: #555;
        }

        .explanation-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .error {
            display: none;
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            border-left: 5px solid #c33;
            margin-bottom: 20px;
        }

        .error.show {
            display: block;
            animation: slideIn 0.3s ease-in-out;
        }

        .icon {
            font-size: 1.2em;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Stock Agent</h1>
            <p class="subtitle">AI-Powered Stock Analysis with Grok</p>
        </header>

        <div class="input-section">
            <div class="dropdown-container">
                <select id="symbolDropdown" onchange="selectFromDropdown()">
                    <option value="">-- Select a Stock --</option>
                    <optgroup label="US Stocks">
                        <option value="AAPL">Apple (AAPL)</option>
                        <option value="GOOGL">Google (GOOGL)</option>
                        <option value="MSFT">Microsoft (MSFT)</option>
                        <option value="AMZN">Amazon (AMZN)</option>
                        <option value="TSLA">Tesla (TSLA)</option>
                        <option value="META">Meta (META)</option>
                        <option value="NVDA">NVIDIA (NVDA)</option>
                        <option value="BRK.B">Berkshire Hathaway (BRK.B)</option>
                        <option value="JNJ">Johnson & Johnson (JNJ)</option>
                        <option value="V">Visa (V)</option>
                    </optgroup>
                    <optgroup label="Indian Stocks">
                        <option value="TCS.NS">Tata Consultancy (TCS.NS)</option>
                        <option value="INFY.NS">Infosys (INFY.NS)</option>
                        <option value="RELIANCE.NS">Reliance (RELIANCE.NS)</option>
                        <option value="HDFCBANK.NS">HDFC Bank (HDFCBANK.NS)</option>
                        <option value="WIPRO.NS">Wipro (WIPRO.NS)</option>
                        <option value="ICICIBANK.NS">ICICI Bank (ICICIBANK.NS)</option>
                        <option value="LT.NS">Larsen & Toubro (LT.NS)</option>
                        <option value="BAJAJ-AUTO.NS">Bajaj Auto (BAJAJ-AUTO.NS)</option>
                    </optgroup>
                    <optgroup label="Other Popular">
                        <option value="BZ=F">Brent Crude Oil</option>
                        <option value="GC=F">Gold Futures</option>
                        <option value="EURUSD=X">EUR/USD</option>
                    </optgroup>
                </select>
            </div>
            <input 
                type="text" 
                id="symbolInput" 
                placeholder="Or enter custom symbol"
                onkeypress="handleKeyPress(event)"
            >
            <button onclick="analyzeStock()">Analyze</button>
        </div>

        <div class="error" id="errorMessage"></div>
        
        <div class="loading" id="loading">
            <span class="spinner"></span>
            Analyzing stock...
        </div>

        <div class="result" id="result">
            <div class="result-header">
                <div class="result-item">
                    <div class="result-label">Stock Symbol</div>
                    <div class="result-value" id="resultSymbol">-</div>
                </div>
                <div class="result-item">
                    <div class="result-label">Current Price</div>
                    <div class="result-value" id="resultPrice">-</div>
                </div>
            </div>

            <div class="result-item" style="margin-bottom: 25px;">
                <div class="result-label">Trend</div>
                <div class="result-value" id="resultTrend">-</div>
            </div>

            <div class="explanation">
                <div class="explanation-title"><span class="icon">🧠</span>AI Insight from Grok:</div>
                <div id="resultExplanation">-</div>
            </div>
        </div>
    </div>

    <script>
        function selectFromDropdown() {
            const selected = document.getElementById('symbolDropdown').value;
            if (selected) {
                document.getElementById('symbolInput').value = selected;
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                analyzeStock();
            }
        }

        async function analyzeStock() {
            const symbol = document.getElementById('symbolInput').value.trim();
            const errorDiv = document.getElementById('errorMessage');
            const loadingDiv = document.getElementById('loading');
            const resultDiv = document.getElementById('result');

            // Clear previous messages
            errorDiv.textContent = '';
            errorDiv.classList.remove('show');
            resultDiv.classList.remove('show');

            if (!symbol) {
                errorDiv.textContent = '❌ Please select or enter a stock symbol';
                errorDiv.classList.add('show');
                return;
            }

            loadingDiv.style.display = 'block';

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ symbol: symbol })
                });

                const data = await response.json();

                loadingDiv.style.display = 'none';

                if (!response.ok) {
                    errorDiv.textContent = `❌ ${data.error}`;
                    errorDiv.classList.add('show');
                    return;
                }

                // Display results
                document.getElementById('resultSymbol').textContent = data.symbol;
                document.getElementById('resultPrice').textContent = `$${data.price}`;
                
                const trendElement = document.getElementById('resultTrend');
                trendElement.textContent = data.trend.toUpperCase();
                trendElement.className = 'result-value ' + (data.trend === 'uptrend' ? 'trend-up' : 'trend-down');
                trendElement.textContent = (data.trend === 'uptrend' ? '📈' : '📉') + ' ' + data.trend.toUpperCase();
                
                document.getElementById('resultExplanation').textContent = data.explanation;

                resultDiv.classList.add('show');

            } catch (error) {
                loadingDiv.style.display = 'none';
                errorDiv.textContent = `❌ Error: ${error.message}`;
                errorDiv.classList.add('show');
            }
        }

        // Focus on input when page loads
        window.addEventListener('load', () => {
            document.getElementById('symbolInput').focus();
        });
    </script>
</body>
</html>
